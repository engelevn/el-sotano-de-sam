<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Sótano de Sam — Acceder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--green:#00ff41;--green-dim:#00dd38;--green-glow:rgba(0,255,65,.15);--red:#ff3344;--font:'Outfit',sans-serif;
--overlay:rgba(0,0,0,.50);
--card-bg:rgba(255,255,255,.06);--card-border:rgba(255,255,255,.12);--card-shadow:rgba(0,0,0,.3);
--input-bg:rgba(255,255,255,.07);--input-border:rgba(255,255,255,.1);
--text:#ffffff;--text-secondary:rgba(255,255,255,.6);--text-placeholder:rgba(255,255,255,.25);--link-color:rgba(255,255,255,.5);--btn-text:#000;
}
body.light{
--green:#55A630;--green-dim:#4a9228;--green-glow:rgba(85,166,48,.2);
--overlay:rgba(255,255,255,.3);
--card-bg:rgba(255,255,255,.55);--card-border:rgba(255,255,255,.6);--card-shadow:rgba(0,0,0,.1);
--input-bg:rgba(255,255,255,.5);--input-border:rgba(0,0,0,.1);
--text:#1a1a1a;--text-secondary:rgba(0,0,0,.5);--text-placeholder:rgba(0,0,0,.3);--link-color:rgba(0,0,0,.4);--btn-text:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:url('img/login-bg.jpg') center/cover no-repeat fixed;font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;transition:all .4s}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);z-index:0;transition:background .4s}
.login-container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);text-decoration:none;font-size:13px;margin-bottom:20px;transition:color .2s}
.back-link:hover{color:var(--green)}
.login-card{background:var(--card-bg);backdrop-filter:blur(30px) saturate(1.4);-webkit-backdrop-filter:blur(30px) saturate(1.4);border:1px solid var(--card-border);border-radius:20px;padding:36px;box-shadow:0 8px 32px var(--card-shadow),inset 0 1px 0 rgba(255,255,255,.1);animation:card-in .5s ease;transition:background .4s,border-color .4s,box-shadow .4s}
@keyframes card-in{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-header{margin-bottom:28px}
.login-brand{font-size:13px;font-weight:600;color:var(--green);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.login-brand::before{display:none}
.login-header h1{font-size:28px;font-weight:700;color:var(--text);margin-bottom:4px;transition:color .4s}
.login-header p{color:var(--text-secondary);font-size:14px;font-weight:300;transition:color .4s}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;transition:color .4s}
.input-wrapper{position:relative}
.form-group input{width:100%;padding:14px 16px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:all .25s;backdrop-filter:blur(10px)}
.form-group input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
.form-group input::placeholder{color:var(--text-placeholder)}
.toggle-password{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:15px;padding:4px;transition:color .2s}
.toggle-password:hover{color:var(--green)}
.btn-login{width:100%;padding:14px;background:var(--green);color:var(--btn-text);border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;margin-top:6px}
.btn-login:hover{background:var(--green-dim);box-shadow:0 0 24px var(--green-glow)}
.btn-login:active{transform:scale(.98)}
.error-msg{display:none;padding:10px 14px;background:rgba(255,51,68,.1);border:1px solid rgba(255,51,68,.25);border-radius:10px;color:var(--red);font-size:13px;margin-bottom:14px;backdrop-filter:blur(10px)}
.error-msg.show{display:block}
.login-footer{margin-top:22px;text-align:center}
.login-footer a{color:var(--link-color);text-decoration:none;font-size:12px;font-weight:300;transition:color .2s;display:block;margin-bottom:6px}
.login-footer a:hover{color:var(--green)}
.theme-toggle{position:fixed;top:20px;right:20px;z-index:10;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);color:var(--text);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s}
body.light .theme-toggle{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1);color:#1a1a1a}
.theme-toggle:hover{transform:scale(1.1)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}}
@media(max-width:480px){.login-container{padding:16px}.login-card{padding:28px 22px;border-radius:16px}.login-header h1{font-size:24px}.theme-toggle{top:12px;right:12px;width:36px;height:36px;font-size:15px}}
@media(max-width:360px){.login-card{padding:24px 18px}}
@media(min-width:481px) and (max-width:768px){.login-container{max-width:380px}}
@media(min-width:1200px){.login-container{max-width:440px}.login-card{padding:42px}}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Cambiar tema"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.75 15.5a9.72 9.72 0 0 1-5.46 1.63C10.29 17.13 5.13 12 5.13 5.97a9.7 9.7 0 0 1 1.63-5.46C2.96 2.35 0 6.53 0 11.38 0 18.4 5.6 24 12.62 24c4.85 0 9.03-2.96 10.88-7.17a9.8 9.8 0 0 1-1.75 1.3z"/></svg></button>
<div class="login-container">
<a href="index.html" class="back-link">← Volver al inicio</a>
<div class="login-card">
<div class="login-header">
<div class="login-brand">El Sótano de Sam</div>
<h1>Accede</h1>
<p>Inicia sesión para continuar</p>
</div>
<div class="error-msg" id="error-msg">Correo o contraseña incorrectos</div>
<div class="form-group">
<label>Correo electrónico</label>
<input type="email" id="input-email" placeholder="admin@sotanodesam.com">
</div>
<div class="form-group">
<label>Clave de acceso</label>
<div class="input-wrapper">
<input type="password" id="input-password" placeholder="••••••••">
<button class="toggle-password" onclick="togglePassword()" id="btn-toggle">👁</button>
</div>
</div>
<button class="btn-login" onclick="iniciarSesion()">Entrar</button>
<div class="login-footer">
<a href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
</div>
<script>
var ADMIN_EMAIL='admin@sotanodesam.com',ADMIN_PASSWORD='admin123';
function iniciarSesion(){var e=document.getElementById('input-email').value.trim(),p=document.getElementById('input-password').value,err=document.getElementById('error-msg');if(!e||!p){err.textContent='Por favor completa todos los campos';err.classList.add('show');return}if(e===ADMIN_EMAIL&&p===ADMIN_PASSWORD){localStorage.setItem('loggedIn','true');localStorage.setItem('user',e);window.location.href='dashboard.html'}else{err.textContent='Correo o contraseña incorrectos';err.classList.add('show');document.querySelector('.login-card').style.animation='none';setTimeout(function(){document.querySelector('.login-card').style.animation='shake 0.4s ease'},10)}}
function togglePassword(){var i=document.getElementById('input-password'),b=document.getElementById('btn-toggle');if(i.type==='password'){i.type='text';b.textContent='🔒'}else{i.type='password';b.textContent='👁'}}
document.addEventListener('keydown',function(e){if(e.key==='Enter')iniciarSesion()});
var themeToggle=document.getElementById('themeToggle');
themeToggle.onclick=function(){document.body.classList.toggle('light');themeToggle.textContent=document.body.classList.contains('light')?'☀️':'🌙'};
</script>
</body>
</html>
